<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Wide AI Discovery Assistant Demo</title>

<style>
body{font-family:Arial;background:#eef4fb;margin:0;padding:20px}
.container{max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:12px}
.header{background:#1d4f91;color:#fff;padding:20px;border-radius:12px;margin-bottom:15px}
.tabs button{margin:5px;padding:10px;border:none;border-radius:8px;background:#ccc}
.active{background:#1d4f91;color:#fff}
.hidden{display:none}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px;background:#1d4f91;color:#fff}
input,textarea{width:100%;padding:10px;margin-top:5px}
.chip{display:inline-block;padding:8px;margin:4px;background:#ddd;border-radius:8px}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>City Wide AI Discovery Assistant Demo</h2>
<p>Guided discovery pilot concept with simulated research and structured Q&A flow.</p>
</div>

<div class="tabs">
<button onclick="showTab('pre')" class="active">Pre-Call</button>
<button onclick="showTab('qa')">Q&A Flow</button>
<button onclick="showTab('summary')">Summary</button>
</div>

<!-- PRECALL -->
<div id="pre">
<h3>Pre-Call Setup</h3>

<label>Company</label>
<input id="company">

<label>Contact</label>
<input id="contact">

<label>Website</label>
<input id="website">

<button onclick="researchCompany()">Research Company</button>
<button onclick="researchContact()">Research Contact</button>

<div id="research"></div>

<button onclick="startQA()">Begin Discovery</button>
</div>

<!-- QA -->
<div id="qa" class="hidden">
<h3 id="question"></h3>

<div id="options"></div>

<textarea id="notes" placeholder="Add notes"></textarea>

<button onclick="next()">Next</button>
</div>

<!-- SUMMARY -->
<div id="summary" class="hidden">
<h3>Summary</h3>
<pre id="output"></pre>
<button>Link to CRM</button>
</div>

</div>

<script>

let step = 0;

const questions = [
{
q:"What is your biggest challenge right now?",
options:["Inconsistent service","Too many vendors","Poor communication","Lack of accountability"]
},
{
q:"Where are problems most visible?",
options:["Restrooms","Common areas","Tenant complaints","Inspections"]
},
{
q:"What would make your job easier?",
options:["One contact","Faster response","Better quality","Less oversight"]
}
];

let answers = [];

function showTab(tab){
document.getElementById("pre").classList.add("hidden");
document.getElementById("qa").classList.add("hidden");
document.getElementById("summary").classList.add("hidden");

document.getElementById(tab).classList.remove("hidden");
}

function researchCompany(){
document.getElementById("research").innerHTML =
"Company appears multi-site with high expectations.";
}

function researchContact(){
document.getElementById("research").innerHTML +=
"<br>Contact likely focused on efficiency and vendor reliability.";
}

function startQA(){
showTab("qa");
load();
}

function load(){
document.getElementById("question").innerText = questions[step].q;

let box = document.getElementById("options");
box.innerHTML = "";

questions[step].options.forEach(o=>{
let btn = document.createElement("button");
btn.innerText = o;
btn.onclick = ()=>document.getElementById("notes").value = o;
box.appendChild(btn);
});
}

function next(){
answers.push(document.getElementById("notes").value);
document.getElementById("notes").value = "";

step++;

if(step < questions.length){
load();
} else {
build();
}
}

function build(){
showTab("summary");

let text = `
Company: ${document.getElementById("company").value}
Contact: ${document.getElementById("contact").value}

Key Findings:
${answers.join("\n")}
`;

document.getElementById("output").innerText = text;
}

</script>

</body>

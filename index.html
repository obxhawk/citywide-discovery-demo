<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Wide AI Discovery Assistant</title>

<style>
body {
  font-family: Arial;
  background: #eef4fb;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #1d4f91;
  color: white;
  border: none;
  border-radius: 8px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

<h2>City Wide AI Discovery Assistant</h2>

<div id="start">
  <label>Company Name</label>
  <input id="company" style="width:100%;padding:10px">

  <label>Contact Name</label>
  <input id="contact" style="width:100%;padding:10px">

  <button onclick="start()">Start Discovery</button>
</div>

<div id="qa" class="hidden">
  <h3 id="question"></h3>
  <textarea id="answer" style="width:100%;padding:10px"></textarea>

  <div id="suggestions"></div>

  <button onclick="next()">Next</button>
</div>

<div id="summary" class="hidden">
  <h3>Summary</h3>
  <pre id="output"></pre>
</div>

</div>

<script>

let step = 0;

const questions = [
"What part of managing this today creates the most frustration?",
"Where are issues most visible?",
"What would make a service partner easier to manage?",
"What happens when issues aren’t handled quickly?"
];

let answers = [];

function start(){
  document.getElementById("start").classList.add("hidden");
  document.getElementById("qa").classList.remove("hidden");
  loadQuestion();
}

function loadQuestion(){
  document.getElementById("question").innerText = questions[step];
  document.getElementById("answer").value = "";

  let suggestions = [
    "Vendor follow-up takes too much time",
    "Too many complaints",
    "Service is inconsistent",
    "I'm managing too many vendors"
  ];

  let box = document.getElementById("suggestions");
  box.innerHTML = "";

  suggestions.forEach(s => {
    let btn = document.createElement("button");
    btn.innerText = s;
    btn.onclick = () => {
      document.getElementById("answer").value = s;
    };
    box.appendChild(btn);
  });
}

function next(){
  let val = document.getElementById("answer").value;
  answers.push(val);

  step++;

  if(step < questions.length){
    loadQuestion();
  } else {
    buildSummary();
  }
}

function buildSummary(){
  document.getElementById("qa").classList.add("hidden");
  document.getElementById("summary").classList.remove("hidden");

  let summary = `
Company: ${document.getElementById("company").value}
Contact: ${document.getElementById("contact").value}

Key Findings:
${answers.join("\n")}
  `;

  document.getElementById("output").innerText = summary;
}

</script>

</body>
</html>
